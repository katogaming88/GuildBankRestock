name: Release

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Ace3 libraries
        run: bash fetch-libs.sh

      - name: Build release zip
        run: |
          cd ..
          zip -r GuildBankRestock.zip GuildBankRestock \
            --exclude "GuildBankRestock/.git/*" \
            --exclude "GuildBankRestock/.github/*" \
            --exclude "GuildBankRestock/fetch-libs.sh" \
            --exclude "GuildBankRestock/.gitignore"

      - name: Extract changelog for this tag
        run: |
          TAG=${GITHUB_REF_NAME}
          awk "/^## \[$TAG\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ../GuildBankRestock.zip
          body_path: release_notes.md
