name: Release

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Ace3 libraries
        run: bash fetch-libs.sh

      - name: Build release zip
        run: |
          cd ..
          zip -r GuildBankRestock.zip GuildBankRestock \
            --exclude "GuildBankRestock/.git/*" \
            --exclude "GuildBankRestock/.github/*" \
            --exclude "GuildBankRestock/fetch-libs.sh" \
            --exclude "GuildBankRestock/.gitignore"

      - name: Build release notes
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}

          # Extract date from changelog header: ## [x.y.z] - YYYY-MM-DD
          DATE=$(grep "^## \[$VERSION\]" CHANGELOG.md | grep -oP '\d{4}-\d{2}-\d{2}' | head -1)

          # Extract bullet-point body between this version header and the next
          BODY=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          REPO_URL="https://github.com/${{ github.repository }}"

          cat > release_notes.md <<EOF
          # Guild Bank Restock

          ## $TAG ($DATE)

          [Full Changelog]($REPO_URL/blob/main/CHANGELOG.md) [Previous Releases]($REPO_URL/releases)

          $BODY
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ../GuildBankRestock.zip
          body_path: release_notes.md

      - name: Upload to CurseForge
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: |
          GAME_VERSION_ID=$(curl -sf \
            -H "X-Api-Token: $CF_API_KEY" \
            "https://wow.curseforge.com/api/game/versions" \
            | jq '[.[] | select(.gameVersionTypeID == 517)] | sort_by(.id) | last | .id')

          METADATA=$(jq -n \
            --arg changelog "$(cat release_notes.md)" \
            --arg tag "${GITHUB_REF_NAME}" \
            --argjson gv "$GAME_VERSION_ID" \
            '{changelog: $changelog, changelogType: "markdown", displayName: $tag, gameVersions: [$gv], releaseType: "release"}')

          curl -sf \
            -H "X-Api-Token: $CF_API_KEY" \
            -F "metadata=$METADATA" \
            -F "file=@../GuildBankRestock.zip" \
            "https://wow.curseforge.com/api/projects/1526978/upload-file"
